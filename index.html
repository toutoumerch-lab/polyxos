    <title>Polyxos — We Build Everything in Your Mind</title>
    <script>
      // Apply the saved/preferred theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('polyxos-theme');
          if (!t) {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
